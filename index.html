<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>AR Viewer</title>
<style>body{margin:0;overflow:hidden}canvas{display:block}#info{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:#fff;padding:8px;font:14px sans-serif}</style>
</head>
<body>
<div id="info">Loading...</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xdddddd);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,5);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,1,0);
controls.update();

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dir=new THREE.DirectionalLight(0xffffff,0.8);
dir.position.set(5,10,5);
scene.add(dir);

const draco=new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const loader=new GLTFLoader();
loader.setDRACOLoader(draco);

let mixer;
loader.load('./model.glb',gltf=>{
  scene.add(gltf.scene);
  const box=new THREE.Box3().setFromObject(gltf.scene);
  const center=box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.set(center.x,center.y+2,center.z+5);
  controls.update();

  const info=document.getElementById('info');
  info.textContent='Animations: '+gltf.animations.length;
  if(gltf.animations.length>0){
    mixer=new THREE.AnimationMixer(gltf.scene);
    gltf.animations.forEach(clip=>{
      info.textContent+=' | '+clip.name+'('+clip.duration.toFixed(1)+'s)';
      mixer.clipAction(clip).play();
    });
  }
},xhr=>{
  document.getElementById('info').textContent='Loading: '+Math.round(xhr.loaded/xhr.total*100)+'%';
});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  if(mixer)mixer.update(clock.getDelta());
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
