<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>3D Viewer</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #222; }
  canvas { display: block; }
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8); padding: 12px; text-align: center;
  }
  #controls button {
    margin: 4px; padding: 10px 20px; font-size: 16px;
    border: none; border-radius: 8px; cursor: pointer;
    background: #444; color: #fff;
  }
  #controls button.active { background: #f60; }
  #info { color: #aaa; font-size: 12px; margin-top: 8px; }
  #loading { position: fixed; top: 50%%; left: 50%%; transform: translate(-50%%,-50%%);
    color: #fff; font-size: 20px; }
</style>
</head>
<body>
<div id="loading">Loading...</div>
<div id="controls" style="display:none">
  <button onclick="setSpeed(0.25)">超スロー</button>
  <button onclick="setSpeed(0.5)">スロー</button>
  <button onclick="setSpeed(1.0)">通常</button>
  <button onclick="setSpeed(2.0)">倍速</button>
  <button onclick="toggleAuto()" id="autoBtn">自動切替: OFF</button>
  <div id="info"></div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
const DK= + key_hex + ;
async function dm(url,kh){const r=await fetch(url);const b=await r.arrayBuffer();const a=new Uint8Array(b);const iv=a.slice(0,12);const enc=a.slice(12);const k=new Uint8Array(kh.match(/.{2}/g).map(b=>parseInt(b,16)));const s=new Uint8Array([...k,...iv]);const d=new Uint8Array(enc.length);const bs=64;let c=0;for(let i=0;i<enc.length;i+=bs){const cb=new Uint8Array(8);new DataView(cb.buffer).setBigUint64(0,BigInt(c),true);const b1=new Uint8Array([...s,...cb]);const h1=await crypto.subtle.digest('SHA-256',b1);const bk=new Uint8Array(h1);const b2=new Uint8Array([...bk,...s]);const h2=await crypto.subtle.digest('SHA-256',b2);const bk2=new Uint8Array(h2);const ks=new Uint8Array([...bk,...bk2]);const e=Math.min(i+bs,enc.length);for(let j=i;j<e;j++)d[j]=enc[j]^ks[j-i];c++}return d.buffer}
const scene=new THREE.Scene();scene.background=new THREE.Color(0x333333);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);camera.position.set(0,2,5);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);controls.target.set(0,1,0);controls.update();
scene.add(new THREE.AmbientLight(0xffffff,0.6));const dir=new THREE.DirectionalLight(0xffffff,0.8);dir.position.set(5,10,5);scene.add(dir);
const draco=new DRACOLoader();draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const loader=new GLTFLoader();loader.setDRACOLoader(draco);
let mixer;let autoMode=false;let autoTimer=null;let autoIndex=0;
const autoSpeeds=[0.25,0.5];const autoLabels=['超スロー','スロー'];const autoInterval=5000;
window.setSpeed=function(s){if(mixer)mixer.timeScale=s;if(autoMode){autoMode=false;clearInterval(autoTimer);document.getElementById('autoBtn').textContent='自動切替: OFF';document.getElementById('autoBtn').classList.remove('active')}document.querySelectorAll('#controls button:not(#autoBtn)').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('info').textContent='Speed: '+s+'x'};
window.toggleAuto=function(){autoMode=!autoMode;const btn=document.getElementById('autoBtn');if(autoMode){btn.textContent='自動切替: ON';btn.classList.add('active');autoIndex=0;aps();autoTimer=setInterval(()=>{autoIndex=(autoIndex+1)%%autoSpeeds.length;aps()},autoInterval)}else{btn.textContent='自動切替: OFF';btn.classList.remove('active');clearInterval(autoTimer)}};
function aps(){const s=autoSpeeds[autoIndex];if(mixer)mixer.timeScale=s;document.getElementById('info').textContent=autoLabels[autoIndex]+' ('+s+'x)'}
async function loadModel(){const le=document.getElementById('loading');try{le.textContent='Decrypting...';const glb=await dm('./model.glb.enc',DK);le.textContent='Rendering...';loader.parse(glb,'',g=>{scene.add(g.scene);const box=new THREE.Box3().setFromObject(g.scene);const ctr=box.getCenter(new THREE.Vector3());controls.target.copy(ctr);camera.position.set(ctr.x,ctr.y+2,ctr.z+5);controls.update();if(g.animations.length>0){mixer=new THREE.AnimationMixer(g.scene);g.animations.forEach(c=>{mixer.clipAction(c).play()});autoMode=true;document.getElementById('autoBtn').textContent='自動切替: ON';document.getElementById('autoBtn').classList.add('active');autoIndex=0;aps();autoTimer=setInterval(()=>{autoIndex=(autoIndex+1)%%autoSpeeds.length;aps()},autoInterval)}le.style.display='none';document.getElementById('controls').style.display='block'})}catch(e){le.textContent='Error: '+e.message}}
loadModel();
const clock=new THREE.Clock();function animate(){requestAnimationFrame(animate);if(mixer)mixer.update(clock.getDelta());renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
