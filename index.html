<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>AR Viewer - Debug</title>
  <script type="module" 
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    model-viewer { width: 100%; height: 70vh; }
    #info { padding: 16px; background: #222; color: #fff; }
    #info p { margin: 4px 0; font-size: 14px; }
    #anim-list { padding: 16px; }
    button { margin: 4px; padding: 8px 16px; font-size: 14px; }
  </style>
</head>
<body>
  <model-viewer 
    id="viewer"
    src="./model.glb" 
    ar 
    autoplay
    camera-controls 
    touch-action="pan-y"
    alt="3D Model">
  </model-viewer>
  <div id="info">
    <p id="anim-count">Loading...</p>
    <p id="anim-names"></p>
    <p id="anim-duration"></p>
  </div>
  <div id="anim-list"></div>
  <script type="module">
    const viewer = document.getElementById('viewer');
    viewer.addEventListener('load', () => {
      const names = viewer.availableAnimations;
      document.getElementById('anim-count').textContent = 
        'Animations found: ' + names.length;
      document.getElementById('anim-names').textContent = 
        'Names: ' + (names.length > 0 ? names.join(', ') : 'NONE');
      
      const list = document.getElementById('anim-list');
      names.forEach(name => {
        const btn = document.createElement('button');
        btn.textContent = name;
        btn.onclick = () => {
          viewer.animationName = name;
          viewer.play();
          document.getElementById('anim-duration').textContent = 
            'Playing: ' + name;
        };
        list.appendChild(btn);
      });

      if (names.length > 0) {
        viewer.animationName = names[0];
        viewer.play();
        document.getElementById('anim-duration').textContent = 
          'Auto-playing: ' + names[0];
      }
    });
  </script>
</body>
</html>
