<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>3D Viewer</title>
<style>
body{margin:0;font-family:sans-serif;background:#222}canvas{display:block}
#controls{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);padding:12px;text-align:center}
#controls button{margin:4px;padding:10px 20px;font-size:16px;border:none;border-radius:8px;cursor:pointer;background:#444;color:#fff}
#controls button.active{background:#f60}
#info{color:#aaa;font-size:12px;margin-top:8px}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:20px}
</style>
</head>
<body>
<div id="loading">Loading...</div>
<div id="controls" style="display:none">
<button onclick="setSpeed(0.25)">超スロー</button>
<button onclick="setSpeed(0.5)">スロー</button>
<button onclick="setSpeed(1.0)">通常</button>
<button onclick="setSpeed(2.0)">倍速</button>
<button onclick="toggleAuto()" id="autoBtn">自動切替: OFF</button>
<div id="info"></div>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{GLTFLoader}from'three/addons/loaders/GLTFLoader.js';
import{DRACOLoader}from'three/addons/loaders/DRACOLoader.js';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const _K='c013119598954457e96dcea313440f563dc7e329e465677551a09423e9493642';
function _d(enc,kh){const kb=new Uint8Array(kh.match(/.{2}/g).map(b=>parseInt(b,16)));
const hb=new Uint8Array(32);const dv=new DataView(hb.buffer);
/* SHA-256 of key to seed xoshiro256** */
let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
const W=new Int32Array(64);const msg=new Uint8Array(64);msg.set(kb);msg[32]=0x80;msg[62]=1;msg[63]=0;
for(let i=0;i<16;i++)W[i]=(msg[i*4]<<24)|(msg[i*4+1]<<16)|(msg[i*4+2]<<8)|msg[i*4+3];
for(let i=16;i<64;i++){const s0=((W[i-15]>>>7)|(W[i-15]<<25))^((W[i-15]>>>18)|(W[i-15]<<14))^(W[i-15]>>>3);const s1=((W[i-2]>>>17)|(W[i-2]<<15))^((W[i-2]>>>19)|(W[i-2]<<13))^(W[i-2]>>>10);W[i]=(W[i-16]+s0+W[i-7]+s1)|0}
let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,hh=h7;
for(let i=0;i<64;i++){const S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));const ch=(e&f)^((~e)&g);const t1=(hh+S1+ch+K[i]+W[i])|0;const S0=((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10));const maj=(a&b)^(a&c)^(b&c);const t2=(S0+maj)|0;hh=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0}
const sd=new DataView(new ArrayBuffer(32));
sd.setUint32(0,(h0+a)|0);sd.setUint32(4,(h1+b)|0);sd.setUint32(8,(h2+c)|0);sd.setUint32(12,(h3+d)|0);sd.setUint32(16,(h4+e)|0);sd.setUint32(20,(h5+f)|0);sd.setUint32(24,(h6+g)|0);sd.setUint32(28,(h7+hh)|0);
/* xoshiro256** */
let s0n=BigInt(sd.getUint32(0))|(BigInt(sd.getUint32(4))<<32n);
let s1n=BigInt(sd.getUint32(8))|(BigInt(sd.getUint32(12))<<32n);
let s2n=BigInt(sd.getUint32(16))|(BigInt(sd.getUint32(20))<<32n);
let s3n=BigInt(sd.getUint32(24))|(BigInt(sd.getUint32(28))<<32n);
const M=0xFFFFFFFFFFFFFFFFn;
function rl(x,k){return((x<<BigInt(k))|(x>>(64n-BigInt(k))))&M}
function nx(){const r=(rl((s1n*5n)&M,7n)*9n)&M;const t=(s1n<<17n)&M;s2n^=s0n;s3n^=s1n;s1n^=s2n;s0n^=s3n;s2n^=t;s3n=rl(s3n,45n);return r}
const out=new Uint8Array(enc.length);
for(let i=0;i<enc.length;i+=8){const v=nx();for(let j=0;j<8&&i+j<enc.length;j++)out[i+j]=enc[i+j]^Number((v>>BigInt(j*8))&0xFFn)}
return out.buffer}

const scene=new THREE.Scene();scene.background=new THREE.Color(0x333333);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);camera.position.set(0,2,5);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
const ctl=new OrbitControls(camera,renderer.domElement);ctl.target.set(0,1,0);ctl.update();
scene.add(new THREE.AmbientLight(0xffffff,0.6));const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(5,10,5);scene.add(dl);
const dc=new DRACOLoader();dc.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const ld=new GLTFLoader();ld.setDRACOLoader(dc);
let mixer,autoMode=false,autoTimer=null,autoIndex=0;
const aSpd=[0.25,0.5],aLbl=['超スロー','スロー'],aInt=5000;
window.setSpeed=function(s){if(mixer)mixer.timeScale=s;if(autoMode){autoMode=false;clearInterval(autoTimer);document.getElementById('autoBtn').textContent='自動切替: OFF';document.getElementById('autoBtn').classList.remove('active')}document.querySelectorAll('#controls button:not(#autoBtn)').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('info').textContent='Speed: '+s+'x'};
window.toggleAuto=function(){autoMode=!autoMode;const btn=document.getElementById('autoBtn');if(autoMode){btn.textContent='自動切替: ON';btn.classList.add('active');autoIndex=0;ap();autoTimer=setInterval(()=>{autoIndex=(autoIndex+1)%aSpd.length;ap()},aInt)}else{btn.textContent='自動切替: OFF';btn.classList.remove('active');clearInterval(autoTimer)}};
function ap(){const s=aSpd[autoIndex];if(mixer)mixer.timeScale=s;document.getElementById('info').textContent=aLbl[autoIndex]+' ('+s+'x)'}
async function go(){const le=document.getElementById('loading');try{le.textContent='Loading...';const r=await fetch('./model.glb.enc');const ab=await r.arrayBuffer();le.textContent='Decrypting...';const enc=new Uint8Array(ab);const glb=_d(enc,_K);le.textContent='Rendering...';ld.parse(glb,'',g=>{scene.add(g.scene);const box=new THREE.Box3().setFromObject(g.scene);const c=box.getCenter(new THREE.Vector3());ctl.target.copy(c);camera.position.set(c.x,c.y+2,c.z+5);ctl.update();if(g.animations.length>0){mixer=new THREE.AnimationMixer(g.scene);g.animations.forEach(cl=>{mixer.clipAction(cl).play()});autoMode=true;document.getElementById('autoBtn').textContent='自動切替: ON';document.getElementById('autoBtn').classList.add('active');autoIndex=0;ap();autoTimer=setInterval(()=>{autoIndex=(autoIndex+1)%aSpd.length;ap()},aInt)}le.style.display='none';document.getElementById('controls').style.display='block'})}catch(e){le.textContent='Error: '+e.message}}
go();
const clk=new THREE.Clock();function ani(){requestAnimationFrame(ani);if(mixer)mixer.update(clk.getDelta());renderer.render(scene,camera)}ani();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
