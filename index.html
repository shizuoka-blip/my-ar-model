<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>AR Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    model-viewer { width: 100%; height: 70vh; }
    #info { padding: 16px; background: #222; color: #fff; }
    button { margin: 4px; padding: 8px 16px; }
  </style>
</head>
<body>
  <model-viewer id="viewer" src="./model.glb" ar autoplay camera-controls alt="3D Model"></model-viewer>
  <div id="info"><p id="result">Loading...</p></div>
  <div id="btns"></div>
  <script type="module">
    const v = document.getElementById('viewer');
    v.addEventListener('load', () => {
      const a = v.availableAnimations;
      document.getElementById('result').textContent = 'Animations: ' + a.length + ' | Names: ' + (a.join(', ') || 'NONE');
      a.forEach(n => {
        const b = document.createElement('button');
        b.textContent = n;
        b.onclick = () => { v.animationName = n; v.play(); };
        document.getElementById('btns').appendChild(b);
      });
    });
  </script>
</body>
</html>
